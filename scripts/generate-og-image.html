<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OG Preview Image — 1200×630</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .card {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 40%, #16213e 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 100px;
      position: relative;
      overflow: hidden;
    }
    /* Decorative accent shapes */
    .card::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: -120px;
      left: -60px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.1) 0%, transparent 70%);
    }
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #6366f1, #0ea5e9, #10b981);
    }
    .label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #6366f1;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    .name {
      font-size: 64px;
      font-weight: 700;
      color: #f8fafc;
      line-height: 1.1;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    .title {
      font-size: 28px;
      font-weight: 400;
      color: #94a3b8;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }
    .tags {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .tag {
      padding: 8px 20px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 500;
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .url {
      position: absolute;
      bottom: 36px;
      right: 100px;
      font-size: 16px;
      color: #64748b;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar"></div>
    <div class="label">Product Portfolio</div>
    <div class="name">Guru Praasad</div>
    <div class="title">Product Manager · AI &amp; Platform</div>
    <div class="tags">
      <span class="tag">AI Initiatives</span>
      <span class="tag">Enterprise SaaS</span>
      <span class="tag">Analytics Transformation</span>
      <span class="tag">Platform Strategy</span>
    </div>
    <div class="url">gurupraasad.github.io</div>
  </div>
</body>
</html>
